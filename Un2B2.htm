                selectHtml += `</select>`;
                
                if (uAns === undefined) {
                    html += `<div class="question-text">${qIdx + 1}. ` + q.q.replace("_____", selectHtml) + `</div>`;
                } else {
                    let isCorrect = uAns === q.ans;
                    let color = isCorrect ? 'var(--correct)' : 'var(--wrong)';
                    let word = sec.fillWords[uAns];
                    html += `<div class="question-text">${qIdx + 1}. ` + q.q.replace("_____", `<span style="background:${color}; padding:2px 8px; border-radius:5px;">${word}</span>`) + `</div>`;
                }
            }
            else if (q.type === 4) {
                // Order
                html += `<div class="question-text">${qIdx + 1}. رَتِّبِي:</div>`;
                if (uAns === undefined) {
                    if (!activeOrders[answerKey]) activeOrders[answerKey] = shuffle([...q.q]);
                    
                    html += `<div class="drop-box" id="drop_${answerKey}"></div>`;
                    html += `<div class="order-area" id="area_${answerKey}">`;
                    activeOrders[answerKey].forEach((w, i) => {
                        html += `<button class="word-btn" id="wb_${answerKey}_${i}" onclick="moveWord('${answerKey}', '${w}', ${i})">${w}</button>`;
                    });
                    html += `</div>`;
                    html += `<button class="check-btn" onclick="checkOrder('${answerKey}', '${q.ans}')">تَحَقُّق (Проверить)</button>`;
                } else {
                    let color = uAns === true ? 'var(--correct)' : 'var(--wrong)';
                    let text = uAns === true ? q.ans : `<del>${userAnswers[answerKey+'_wrongtext']}</del> <br> <span style="color:#155724; font-size:0.9em">الصَّوَابُ: ${q.ans}</span>`;
                    html += `<div class="drop-box" style="background:${color}; display:block;">${text}</div>`;
                }
            }
            else if (q.type === 5) {
                // Textarea
                html += `<div class="question-text">${qIdx + 1}. ${q.q}</div>`;
                let val = uAns || "";
                html += `<textarea class="textarea-box" onblur="handleText('${answerKey}', this.value)" placeholder="اُكْتُبِي هُنَا...">${val}</textarea>`;
            }
            
            html += `</div>`;
        });

        document.getElementById('sectionContainer').innerHTML = html;
        document.getElementById('progress').innerText = `الْقِسْمُ ${currentSection + 1} مِنْ ${sectionsData.length}`;
        document.getElementById('prevBtn').disabled = currentSection === 0;
        
        let nextBtn = document.getElementById('nextBtn');
        if (currentSection === sectionsData.length - 1) {
            nextBtn.innerText = "إِنْهَاء الِاخْتِبَارِ";
            nextBtn.style.backgroundColor = "#27ae60";
        } else {
            nextBtn.innerText = "الْقِسْمُ التَّالِي";
            nextBtn.style.backgroundColor = "var(--primary)";
        }
        
        window.scrollTo(0,0);
    }

    function handleMCQ(sIdx, qIdx, chosen, correct) {
        userAnswers[`s${sIdx}_q${qIdx}`] = chosen;
        if (chosen === correct) score++;
        renderSection(); // Re-render to show colors and disable
    }

    function handleFill(sIdx, qIdx, sel, correct) {
        let val = parseInt(sel.value);
        let key = `s${sIdx}_q${qIdx}`;
        if (val === correct) {
            sel.style.backgroundColor = 'var(--correct)';
            userAnswers[key] = val;
            score++;
            setTimeout(renderSection, 600);
        } else {
            sel.style.backgroundColor = 'var(--wrong)';
            setTimeout(() => { sel.style.backgroundColor = '#fff'; sel.value = ""; }, 1000);
        }
    }

    // State for ordering logic
    let userOrderArrays = {}; 
    
    function moveWord(key, w, i) {
        if (!userOrderArrays[key]) userOrderArrays[key] = [];
        userOrderArrays[key].push(w);
        document.getElementById(`wb_${key}_${i}`).style.display = 'none';
        let dropBox = document.getElementById(`drop_${key}`);
        dropBox.innerHTML += `<button class="word-btn" style="background:#7f8c8d" onclick="revertWord('${key}', '${w}', ${i}, this)">${w}</button>`;
    }
    
    function revertWord(key, w, i, el) {
        userOrderArrays[key] = userOrderArrays[key].filter(word => word !== w);
        el.remove();
        document.getElementById(`wb_${key}_${i}`).style.display = 'inline-block';
    }

    function checkOrder(key, correctStr) {
        if (!userOrderArrays[key] || userOrderArrays[key].length === 0) return;
        let userStr = userOrderArrays[key].join(" ");
        let dropBox = document.getElementById(`drop_${key}`);
        
        if (userStr === correctStr) {
            dropBox.style.backgroundColor = 'var(--correct)';
            userAnswers[key] = true;
            score++;
            setTimeout(renderSection, 600);
        } else {
            dropBox.style.backgroundColor = 'var(--wrong)';
            setTimeout(() => {
                // allow retry by resetting
                dropBox.style.backgroundColor = '#fafafa';
                dropBox.innerHTML = '';
                userOrderArrays[key] = [];
                renderSection();
            }, 1000);
        }
    }

    function handleText(key, val) {
        userAnswers[key] = val;
    }

    function navigate(dir) {
        // Soft validation can be added here if needed, currently allows moving forward
        currentSection += dir;
        renderSection();
    }

    function showFinalResult() {
        document.getElementById('sectionContainer').style.display = 'none';
        document.getElementById('navArea').style.display = 'none';
        document.getElementById('header').style.display = 'none';
        
        let res = document.getElementById('resultBox');
        res.style.display = 'block';
        res.innerHTML = `
            <h2>تَمَّ إِنْهَاءُ الِاخْتِبَارِ بِنَجَاحٍ!</h2>
            <div class="ru-text">Тест успешно завершен!</div>
            <div class="result-score">${score} / 95</div>
            <p>هَذِهِ هِيَ النَّتِيجَةُ الْآلِيَّةُ لِلْأَسْئِلَةِ الْمَوْضُوعِيَّةِ.</p>
            <p style="color:#e67e22; font-size:0.9em; margin-top:15px;">* الْقِسْمُ الْأَخِيرُ (15 دَرَجَةً) يُقَيِّمُهُ الْمُعَلِّمُ يَدَوِيًّا حَسَبَ تَعْبِيرِكِ.</p>
            <button class="nav-btn" style="margin-top:30px;" onclick="location.reload()">إِعَادَةُ الِاخْتِبَارِ</button>
        `;
    }

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    window.onload = init;
</script>
</body>
</html>
